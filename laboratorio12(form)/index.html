<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Práctica 12 · Formulario de Inscripción</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="page-wrapper">
        <header class="site-header">
            <span class="badge">Práctica 12</span>
            <h1 class="site-title">Formulario de<br><em>Inscripción</em></h1>
            <p class="site-subtitle">Rellena los campos para unirte a la comunidad de desarrolladores.</p>
        </header>
        <main>
            <form id="registro-form" action="procesar.php" method="POST" novalidate>
                <fieldset id="datos-personales">
                    <legend>Datos Personales</legend>
                    <div class="form-group">
                        <label for="nombre">Nombre completo</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Ej. Ada Lovelace" required
                            autocomplete="name" />
                    </div>
                    <div class="form-group">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" name="email" placeholder="ada@ejemplo.com" required
                            autocomplete="email" />
                    </div>
                    <div class="form-group">
                        <label for="password">Contraseña</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" placeholder="Mínimo 8 caracteres"
                                autocomplete="new-password" />
                            <button type="button" class="toggle-pw" aria-label="Mostrar contraseña"
                                title="Mostrar / ocultar">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                                    stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                    stroke-linejoin="round" class="icon-eye">
                                    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                                    <circle cx="12" cy="12" r="3" />
                                </svg>
                            </button>
                        </div>
                        <span class="hint" id="pw-hint">La contraseña debe tener al menos 8 caracteres.</span>
                    </div>
                    <div class="form-group">
                        <label for="lenguaje">Lenguaje favorito</label>
                        <select id="lenguaje" name="lenguaje">
                            <option value="" disabled selected>— Elige una opción —</option>
                            <option value="html">HTML</option>
                            <option value="js">JavaScript</option>
                            <option value="python">Python</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="motivacion">¿Por qué quieres inscribirte?</label>
                        <textarea id="motivacion" name="motivacion"
                            placeholder="Cuéntanos tu motivación en pocas palabras…" rows="4"
                            maxlength="300"></textarea>
                        <span class="char-counter"><span id="char-count">0</span> / 300</span>
                    </div>

                </fieldset>

                <div id="error-msg" class="error-box" role="alert" aria-live="polite" hidden>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="12" y1="8" x2="12" y2="12" />
                        <line x1="12" y1="16" x2="12.01" y2="16" />
                    </svg>
                    <span id="error-text"></span>
                </div>

                <button type="submit" class="btn-submit">
                    <span>Enviar inscripción</span>
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M5 12h14M12 5l7 7-7 7" />
                    </svg>
                </button>

            </form>
        </main>

        <footer class="site-footer">
            <p> Aunque valides en JS, <strong>siempre valida también en el servidor</strong> para garantizar la
                seguridad total.</p>
        </footer>

    </div>

    <script src="script.js"></script>
</body>

</html>
